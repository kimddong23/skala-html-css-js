<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
    <h1><i class="bi bi-person-plus-fill"></i> 회원가입</h1>
    <p>SKALA-FRONT 커뮤니티 가입 폼입니다.<br>가입은 쉽지만, 탈퇴는 <code>git revert</code>처럼 번거로우니 신중히.</p>
    <hr>

    <!-- 전체 입력을 form 하나로 묶어서 필수입력 검사와 제출이 한 번에 되게 함.
         method="get" 이라 제출하면 입력값이 쿼리스트링으로 주소창에 붙어서 넘어감. -->
    <form action="signUpResult.html" method="get">

        <fieldset>
            <legend><i class="bi bi-shield-lock"></i> 계정 정보</legend>
            <p>
                <label for="userID">아이디: </label>
                <!-- required, minlength 등을 넣으면 자바스크립트 없이 브라우저가 기본 검사를 해줌 -->
                <input type="text" id="userID" name="userID" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
                <small>(필수)</small>
            </p>
            <p>
                <label for="userPw">비밀번호: </label>
                <!-- [추가과제] 비밀번호 보기/숨기기 토글 (눈 아이콘) -->
                <span class="input-with-icon">
                    <input type="password" id="userPw" name="userPw" minlength="8" maxlength="20" required placeholder="8자 이상 입력">
                    <button type="button" id="pwToggle" class="icon-btn" aria-label="비밀번호 표시/숨김"><i class="bi bi-eye"></i></button>
                </span>
                <small>(필수)</small>
                <!-- [추가과제] 비밀번호 강도 실시간 표시 -->
                <span class="pw-meter" id="pwMeter" aria-hidden="true"><i></i></span>
                <small id="pwMsg" class="pw-msg"></small>
            </p>
            <p>
                <label for="userEmail">이메일: </label>
                <input type="email" id="userEmail" name="userEmail" placeholder="ex@example.com">
                @
                <!-- 이메일 도메인은 select 드롭다운으로 선택 -->
                <select name="emailDomain">
                    <option value="direct">직접 입력</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="daum.net">daum.net</option>
                </select>
            </p>
        </fieldset>

        <fieldset>
            <legend><i class="bi bi-person-lines-fill"></i> 개인 프로필 정보</legend>
            <p>
                <label for="userName">이름: </label>
                <input type="text" id="userName" name="userName">
            </p>
            <p>
                성별:
                <!-- radio는 name이 같아야 그룹으로 묶여 하나만 선택됨 -->
                <label><input type="radio" name="gender" value="male" checked> 남성</label>
                <label><input type="radio" name="gender" value="female"> 여성</label>
                <label><input type="radio" name="gender" value="none"> 선택안함</label>
            </p>
            <p>
                관심분야 (중복 선택 가능): <br>
                <!-- checkbox는 여러 개 체크 가능. name이 같으면 같은 그룹으로 넘어감 -->
                <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label>
                <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label>
                <label><input type="checkbox" name="interest" value="backend"> 백엔드 &amp; 데이터베이스</label>
                <label><input type="checkbox" name="interest" value="devops"> 클라우드 &amp; 인프라</label>
            </p>
        </fieldset>

        <fieldset>
            <legend><i class="bi bi-chat-left-text"></i> 자기소개</legend>
            <p>
                <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사</label><br>
                <textarea id="intro" name="intro" rows="5" cols="50" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                <!-- [추가과제] 자기소개 글자수 실시간 카운터 -->
                <small class="char-count"><span id="introCount">0</span> / 200</small>
            </p>
        </fieldset>

        <br>
        <input type="submit" class="btn-submit" value="동의하고 회원가입">
        <input type="reset" class="btn-reset" value="다시 작성">
    </form>
    </div>

    <!-- 입력칸 조건을 못 맞췄을 때 뜨는 경고 문구를 커스텀 문구로 바꿔주는 스크립트 -->
    <script src="script/signupValidation.js"></script>
    <!-- [추가과제] 비밀번호 보기토글·강도미터·글자수 카운터 -->
    <script src="script/signupEnhance.js"></script>
</body>
</html>
