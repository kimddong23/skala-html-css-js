<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 휴일 일과</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
    <h1><i class="bi bi-cup-hot-fill"></i> 나의 휴일 일과</h1>
    <br>

    <!-- 시간대별로 나눠서 정리. 강조하고 싶은 단어는 <mark>로 형광펜 처리 -->
    <h2><i class="bi bi-sunrise"></i> <u>아침</u></h2>
    <p>
        09:00 : 맛있게 늦잠 자기<br>
        10:00 : 일어났지만 더 뒹굴기<br>
        11:00 : 배달 뭐먹을지 고민하기<br>
        12:00 : 결국 돌고 돌아 <mark>치킨</mark>주문
    </p>

    <h2><i class="bi bi-sun-fill"></i> <u>오후</u></h2>
    <p>
        13:00 : 밥 먹었으니까 디저트 먹방<br>
        14:00 : 식곤증 오니까 다시 누워버리기<br>
        15:00 : 꿀같은 <mark>낮잠</mark><br>
    </p>

    <h2><i class="bi bi-moon-stars-fill"></i> <u>저녁</u></h2>
    <p>
        18:00 : 케글 대회 참여하는거 고도화<br>
        19:00 : 저녁은 양심적으로 샌드위치로 합의. 먹으면서 코딩<br>
        23:59 : 찾아올 출근에 <mark>눈물 흘리며 잘 준비</mark><br>
    </p>

    <hr>
    <p>작성일 : 2026년 7월 15일 (수)</p>
    </div>
</body>
</html>
